<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    {% if name %}
    <h1>Hello {{ name }}</h1>
    {% else %}
    <h1>Hello World</h1>
    {% endif %}
    <ul>
        {% for product in products %}
        <li>{{ product.title }} ${{ product.unit_price }}</li> {# n + 1 problem #}
        <li>{{ product.title }} ${{ product.description }}</li> {# n + 1 problem #}
        {% endfor %}
    </ul>
</body>
</html>
